name: CI

on:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read
    pull-requests: write

jobs:
    build_and_deploy:
        runs-on: ubuntu-latest

        env:
            CURRENT_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

        outputs:
            preview_url: ${{ steps.deploy.outputs.deployment-url }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm lint

            - name: Format
              run: pnpm format

            - name: Build
              run: pnpm build

            - name: Deploy to Cloudflare Pages
              id: deploy
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: pages deploy dist --project-name="website" --branch="${{ env.CURRENT_BRANCH }}"

    lighthouse:
        needs: build_and_deploy
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        env:
            PREVIEW_URL: ${{ needs.build_and_deploy.outputs.preview_url }}
        steps:
            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Install Lighthouse CI
              run: pnpm dlx @lhci/cli install

            - name: Run Lighthouse CI
              run: |
                  pnpm dlx lhci autorun \
                    --collect.url="$PREVIEW_URL" \
                    --upload.target=filesystem \
                    --upload.outputDir="./lhci-report" \
                    --assert.preset=lighthouse:recommended

            - name: Upload Lighthouse report
              uses: actions/upload-artifact@v4
              with:
                  name: lighthouse-report
                  path: lhci-report

            - name: Comment Lighthouse results on PR
              uses: marocchino/sticky-pull-request-comment@v2
              with:
                  message: |
                      🔍 **Lighthouse CI Report**

                      Preview URL: ${{ env.PREVIEW_URL }}

                      A full Lighthouse report has been generated and uploaded as an artifact.

                      Categories audited:
                      - Performance  
                      - Accessibility  
                      - Best Practices  
                      - SEO
