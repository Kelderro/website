name: CI

on:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: write
    pull-requests: write

jobs:
    build_and_deploy:
        runs-on: ubuntu-latest

        env:
            CURRENT_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

        outputs:
            preview_url: ${{ steps.deploy.outputs.deployment-url }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  ref: ${{ github.head_ref || github.ref_name }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.33.0

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint and auto-fix
              run: pnpm run lint:fix

            - name: Format
              run: pnpm format

            - name: Commit auto-fixes
              if: github.event_name == 'pull_request'
              uses: stefanzweifel/git-auto-commit-action@v7
              with:
                  commit_message: 'chore: auto-fix lint and formatting [skip ci]'
                  skip_dirty_check: false

            - name: Build
              run: pnpm build

            - name: Deploy to Cloudflare Pages
              id: deploy
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: pages deploy dist --project-name="website-kelderro-nl" --branch="${{ env.CURRENT_BRANCH }}"
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    lighthouse:
        needs: build_and_deploy
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        env:
            PREVIEW_URL: ${{ needs.build_and_deploy.outputs.preview_url }}

        steps:
            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.33.0

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Create lighthouserc.json with Zero Trust Headers
              # is-crawlable is disabled because Cloudflare Pages automatically adds
              # 'noindex' headers to preview deployments, causing this audit to always
              # fail in CI regardless of the actual site configuration.
              run: |
                  cat << 'EOF' > lighthouserc.json
                  {
                    "ci": {
                      "collect": {
                        "numberOfRuns": 1,
                        "settings": {
                          "extraHeaders": {
                            "CF-Access-Client-Id": "${{ secrets.CF_ACCESS_CLIENT_ID }}",
                            "CF-Access-Client-Secret": "${{ secrets.CF_ACCESS_CLIENT_SECRET }}"
                          }
                        }
                      },
                      "assert": {
                        "preset": "lighthouse:recommended",
                        "assertions": {
                          "is-crawlable": "off"
                        }
                      }
                    }
                  }
                  EOF

            - name: Run Lighthouse CI
              run: |
                  pnpm dlx @lhci/cli autorun \
                    --collect.url="$PREVIEW_URL" \
                    --upload.target=filesystem \
                    --upload.outputDir="./lhci-report"

            - name: Upload Lighthouse report
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: lighthouse-report
                  path: lhci-report

            - name: Comment Lighthouse results on PR
              if: always()
              uses: marocchino/sticky-pull-request-comment@v3
              with:
                  message: |
                      🔍 **Lighthouse CI Report**

                      Preview URL: ${{ env.PREVIEW_URL }}

                      A full Lighthouse report has been generated and uploaded as an artifact.

                      Categories audited:
                      - Performance  
                      - Accessibility  
                      - Best Practices  
                      - SEO
