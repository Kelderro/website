version: 2
updates:
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'saturday'
      groups:
          pnpm-dependencies:
              patterns:
                  - '*'
              update-types:
                  - 'patch'
                  - 'minor'
    - package-ecosystem: 'devcontainers'
      directory: '/'
      schedule:
          interval: 'monthly'
          day: 'saturday'
      open-pull-requests-limit: 2
    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'saturday'
      open-pull-requests-limit: 2
      groups:
          github-actions:
              patterns:
                  - '*'
              update-types:
                  - 'patch'
                  - 'minor'
