name: CI

on:
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Format
              run: npm run format

            - name: Build
              run: npm run build

    wait_for_preview:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - name: Wait for Cloudflare Pages preview deployment
              uses: WalshyDev/wait-for-cloudflare-pages@v1
              id: wait
              with:
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  projectName: website
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  branch: ${{ github.head_ref }}

            - name: Save preview URL
              run: echo "PREVIEW_URL=${{ steps.wait.outputs.url }}" >> $GITHUB_ENV

    lighthouse:
        needs: wait_for_preview
        runs-on: ubuntu-latest

        steps:
            - name: Install Lighthouse CI
              run: npm install -g @lhci/cli

            - name: Run Lighthouse CI
              run: |
                  lhci autorun \
                    --collect.url="$PREVIEW_URL" \
                    --upload.target=filesystem \
                    --upload.outputDir="./lhci-report" \
                    --assert.preset=lighthouse:recommended

            - name: Upload Lighthouse report
              uses: actions/upload-artifact@v4
              with:
                  name: lighthouse-report
                  path: lhci-report

            - name: Comment Lighthouse results on PR
              uses: marocchino/sticky-pull-request-comment@v2
              with:
                  message: |
                      🔍 **Lighthouse CI Report**

                      Preview URL: ${{ env.PREVIEW_URL }}

                      A full Lighthouse report has been generated and uploaded as an artifact.

                      Key categories audited:
                      - Performance  
                      - Accessibility  
                      - Best Practices  
                      - SEO  

                      You can download the full report from the PR artifacts.
